name: QA Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create evidencias directories
        run: mkdir -p evidencias/manual evidencias/bugs

      - name: Run tests
        run: npx playwright test
        continue-on-error: true
        env:
          DEMO_USERNAME: ${{ secrets.DEMO_USERNAME || 'administrator' }}
          DEMO_PASSWORD: ${{ secrets.DEMO_PASSWORD || 'administrator' }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            evidencias/
          retention-days: 30
